<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWAPPR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body
    class="font-sans min-h-screen transition-colors duration-300 bg-purple-50 text-gray-900 dark:bg-[#0c0a18] dark:text-purple-100"
  >
    <!-- Header -->
    <header
      class="px-6 py-4 flex items-center justify-between bg-white dark:bg-[#110e20] border-b border-purple-100 dark:border-white/[0.06] transition-colors duration-300 sticky top-0 z-40 shadow-sm"
    >
      <button
        onclick="filterBy('all')"
        class="flex items-center gap-2 cursor-pointer bg-transparent border-none p-0 transition-opacity hover:opacity-75"
      >
        <span class="text-2xl">⇄</span>
        <h1
          class="text-2xl font-extrabold tracking-tight text-purple-800 dark:text-purple-300"
          style="
            text-shadow:
              0 0 8px rgba(167, 139, 250, 0.8),
              0 0 20px rgba(124, 58, 237, 0.5);
          "
        >
          SWAPPR
        </h1>
      </button>
      <div class="flex items-center gap-3">
        <button
          id="userBadge"
          onclick="openProfilePanel()"
          class="hidden items-center gap-2 px-3 py-1.5 rounded-full border transition cursor-pointer bg-[#faf5ff] dark:bg-[#181428] border-[#ddd6fe] dark:border-white/[0.06]"
        >
          <span
            class="text-xs font-bold text-[#4a0080] dark:text-[#d0c0f8]"
            id="userBadgeName"
          ></span>
          <span class="text-xs">👤</span>
        </button>
        <button
          id="addPortfolioBtn"
          onclick="openAddModal()"
          class="hidden text-xs font-bold px-4 py-2 rounded-full text-white transition shadow-sm btn-primary"
        >
          + Notebook
        </button>
        <button
          id="themeToggle"
          class="w-8 h-8 rounded-full flex items-center justify-center transition text-sm border bg-[#faf5ff] dark:bg-[#181428] border-[#ddd6fe] dark:border-white/[0.06]"
        >
          🌙
        </button>
        <button
          onclick="handleLogout()"
          class="text-xs font-bold px-3 py-1.5 rounded-full border transition text-purple-700 dark:text-purple-300 border-purple-200 dark:border-white/[0.1] hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 dark:hover:text-red-400 hover:border-red-200 dark:hover:border-red-900/40"
        >
          Logout
        </button>
      </div>
    </header>
    <!-- Main Layout -->
    <div class="flex">
      <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
      <aside
        class="w-56 bg-white dark:bg-[#110e20] p-5 hidden md:flex flex-col gap-6 shrink-0 border-r border-purple-100 dark:border-white/[0.06] sticky top-[65px] h-[calc(100vh-65px)] overflow-y-auto"
      >
        <!-- Browse nav -->
        <div>
          <p
            class="text-xs font-bold uppercase tracking-widest mb-2 px-2 text-purple-300 dark:text-purple-400"
          >
            Browse
          </p>
          <nav class="space-y-1">
            <a
              href="#"
              data-filter="all"
              onclick="filterBy('all')"
              class="sidebar-link active flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold transition"
              >📚 All Notebooks</a
            >
            <a
              href="#"
              data-filter="mine"
              onclick="filterBy('mine')"
              class="sidebar-link flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold transition"
              >📓 My Notebooks</a
            >
            <a
              href="#"
              data-filter="matched"
              onclick="filterBy('matched')"
              class="sidebar-link flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold transition"
              >🤝 My SWAPPs</a
            >
            <a
              href="#"
              data-filter="requests"
              onclick="filterBy('requests')"
              class="sidebar-link flex items-center justify-between gap-2 px-3 py-2 rounded-lg text-sm font-semibold transition"
            >
              <span>📩 Requests</span>
              <span
                id="requestsBadge"
                class="hidden bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
                >0</span
              >
            </a>
          </nav>
        </div>
        <div class="h-px bg-purple-100 dark:bg-[#3a2565]"></div>
        <!-- 🏆 Top Notebooks -->
        <div>
          <p
            class="text-xs font-bold uppercase tracking-widest mb-3 px-2 text-purple-300 dark:text-purple-400 flex items-center gap-1"
          >
            🏆 Top Notebooks
          </p>
          <div id="sidebarTop" class="space-y-2">
            <p class="text-xs text-purple-300 px-2">Loading…</p>
          </div>
        </div>
        <div class="h-px bg-purple-100 dark:bg-[#3a2565]"></div>
        <!-- 🕒 Recently Added -->
        <div>
          <p
            class="text-xs font-bold uppercase tracking-widest mb-3 px-2 text-purple-300 dark:text-purple-400 flex items-center gap-1"
          >
            🕒 Recently Added
          </p>
          <div id="sidebarRecent" class="space-y-2">
            <p class="text-xs text-purple-300 px-2">Loading…</p>
          </div>
        </div>
      </aside>
      <!-- ── Main Content ──────────────────────────────────────────────── -->
      <main class="flex-1 p-8 min-h-0">
        <div class="flex items-center gap-3 mb-6">
          <h2
            id="sectionTitle"
            class="text-xl font-extrabold tracking-tight shrink-0 text-purple-900 dark:text-purple-100"
          >
            All Notebooks
          </h2>
          <div class="relative w-72">
            <input
              type="text"
              id="searchInput"
              placeholder="Search notebooks or authors…"
              class="w-full pl-8 pr-3 py-1.5 rounded-xl text-xs outline-none transition input-field"
            />
            <span
              class="absolute left-2.5 top-1/2 -translate-y-1/2 text-purple-300 text-xs"
              >🔍</span
            >
          </div>
        </div>
        <div
          id="notebookGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
        ></div>
      </main>
    </div>
    <!-- ── Profile Panel ──────────────────────────────────────────────────── -->
    <div
      id="profileOverlay"
      class="profile-overlay"
      onclick="closeProfilePanel()"
    ></div>
    <div id="profilePanel" class="profile-panel">
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-2">
          <span class="text-lg">⇄</span>
          <span
            class="text-sm font-extrabold tracking-widest uppercase text-purple-800 dark:text-purple-200"
            >Profile</span
          >
        </div>
        <button
          onclick="closeProfilePanel()"
          class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold bg-purple-100 dark:bg-[#181428] text-purple-400 hover:bg-purple-200 dark:hover:bg-[#3a2565] transition"
        >
          ✕
        </button>
      </div>
      <div class="panel-hero mb-6">
        <div class="profile-avatar mx-auto mb-3">
          <span id="profileInitials"></span>
        </div>
        <p
          class="font-extrabold text-white text-lg text-center leading-tight"
          id="profileName"
        ></p>
        <p
          class="text-xs text-purple-300 font-medium text-center mt-1"
          id="profileUsername"
        ></p>
        <p class="text-xs text-purple-400 text-center mt-2" id="profileBio"></p>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="stat-card">
          <p
            class="text-3xl font-extrabold text-purple-700 dark:text-purple-300"
            id="profilePortfolioCount"
          >
            0
          </p>
          <p
            class="text-xs text-purple-400 font-semibold mt-1 uppercase tracking-wider"
          >
            Portfolios
          </p>
        </div>
        <div class="stat-card">
          <p
            class="text-3xl font-extrabold text-indigo-500 dark:text-indigo-300"
            id="profileSwappCount"
          >
            0
          </p>
          <p
            class="text-xs text-purple-400 font-semibold mt-1 uppercase tracking-wider"
          >
            SWAPPs
          </p>
        </div>
      </div>
      <div class="h-px bg-purple-100 dark:bg-[#3a2565] mb-5"></div>
      <div class="mb-6">
        <p
          class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-3 flex items-center gap-2"
        >
          <span>📚</span> My Notebooks
        </p>
        <div id="profilePortfolioList" class="space-y-2"></div>
      </div>
      <div class="h-px bg-purple-100 dark:bg-[#3a2565] mb-5"></div>
      <div>
        <p
          class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-3 flex items-center gap-2"
        >
          <span>🤝</span> SWAPP Matches
        </p>
        <div id="profileMatchList" class="space-y-2"></div>
      </div>
    </div>
    <!-- ── Add / Edit Modal ───────────────────────────────────────────────── -->
    <div
      id="addModal"
      class="modal-overlay hidden"
      onclick="closeAddModal(event)"
    >
      <div class="modal-box">
        <h3
          id="modalHeading"
          class="text-lg font-extrabold mb-5 text-purple-900 dark:text-purple-100"
        >
          New Notebook
        </h3>
        <div class="space-y-4">
          <div>
            <label class="field-section-label"
              >Title <span class="text-red-400">*</span></label
            >
            <input
              type="text"
              id="newTitle"
              class="input-field"
              placeholder="e.g. Data Structures Notes"
            />
          </div>
          <div>
            <label class="field-section-label">Short Description</label>
            <textarea
              id="newDescription"
              rows="2"
              class="input-field resize-none"
              placeholder="What's this notebook about? (optional)"
            ></textarea>
          </div>
          <div>
            <label class="field-section-label">Department / Subject Tag</label>
            <select id="newDept" class="input-field">
              <option value="">— Select department —</option>
              <option value="BS Computer Science">BS Computer Science</option>
              <option value="BS Information Technology">
                BS Information Technology
              </option>
              <option value="BS Computer Engineering">
                BS Computer Engineering
              </option>
              <option value="BS Electrical Engineering">
                BS Electrical Engineering
              </option>
              <option value="BS Electronics Engineering">
                BS Electronics Engineering
              </option>
              <option value="BS Civil Engineering">BS Civil Engineering</option>
              <option value="BS Mechanical Engineering">
                BS Mechanical Engineering
              </option>
              <option value="BS Industrial Engineering">
                BS Industrial Engineering
              </option>
              <option value="BS Chemical Engineering">
                BS Chemical Engineering
              </option>
              <option value="BS Nursing">BS Nursing</option>
              <option value="BS Pharmacy">BS Pharmacy</option>
              <option value="BS Psychology">BS Psychology</option>
              <option value="BS Business Administration">
                BS Business Administration
              </option>
              <option value="BS Accountancy">BS Accountancy</option>
              <option value="BS Economics">BS Economics</option>
              <option value="BS Mathematics">BS Mathematics</option>
              <option value="BS Physics">BS Physics</option>
              <option value="BS Chemistry">BS Chemistry</option>
              <option value="BS Communication">BS Communication</option>
              <option value="BS Fine Arts">BS Fine Arts</option>
              <option value="BS Hospitality Management">
                BS Hospitality Management
              </option>
              <option value="BS Nutrition and Dietetics">
                BS Nutrition and Dietetics
              </option>
              <option value="BS Political Science">BS Political Science</option>
              <option value="AB Anthropology">AB Anthropology</option>
              <option value="AB History">AB History</option>
              <option value="AB Literature">AB Literature</option>
              <option value="AB Philosophy">AB Philosophy</option>
              <option value="AB Sociology">AB Sociology</option>
              <option value="JD Law">JD Law</option>
              <option value="Bachelor of Secondary Education">
                Bachelor of Secondary Education
              </option>
              <option value="Bachelor of Elementary Education">
                Bachelor of Elementary Education
              </option>
            </select>
          </div>
          <div>
            <label class="field-section-label"
              >File URL
              <span
                class="text-purple-300 font-normal normal-case tracking-normal"
                >(Google Drive, Notion, etc.)</span
              ></label
            >
            <input
              type="text"
              id="newFileUrl"
              class="input-field"
              placeholder="https://drive.google.com/…"
            />
          </div>
          <div class="flex justify-end gap-3 pt-2">
            <button
              onclick="closeAddModal()"
              class="text-sm font-semibold text-purple-300 hover:text-purple-600 transition"
            >
              Cancel
            </button>
            <button onclick="submitPortfolio()" class="btn-primary">
              Publish
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/script.js"></script>
  </body>
</html>

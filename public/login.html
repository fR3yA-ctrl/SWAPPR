<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWAPPR — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login_styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <!-- Background particles -->
    <div
      class="bg-particle"
      style="
        width: 300px;
        height: 300px;
        top: 10%;
        left: 5%;
        animation-delay: 0s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 200px;
        height: 200px;
        top: 60%;
        left: 10%;
        animation-delay: 5s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 250px;
        height: 250px;
        top: 30%;
        right: 10%;
        animation-delay: 3s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 180px;
        height: 180px;
        bottom: 20%;
        right: 15%;
        animation-delay: 7s;
      "
    ></div>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <div class="content-wrapper">
        <!-- LEFT SIDE - BRANDING -->
        <div class="branding">
          <div class="logo-section">
            <img
              src="Images/swappr_logo_updated.jpg"
              alt="SWAPPR Logo"
              class="logo-img"
              onerror="this.style.display = 'none'"
            />
            <h1 class="brand-name">SWAPPR</h1>
          </div>

          <p class="tagline">
            Connect with students, trade notes, and achieve academic success
            together.
          </p>

          <div class="features">
            <div class="feature-item">
              <i data-lucide="book-open" class="feature-icon"></i>
              <span>Exchange study materials instantly</span>
            </div>
            <div class="feature-item">
              <i data-lucide="handshake" class="feature-icon"></i>
              <span>Find your perfect study partner</span>
            </div>
            <div class="feature-item">
              <i data-lucide="target" class="feature-icon"></i>
              <span>Improve grades through collaboration</span>
            </div>
          </div>
        </div>

        <!-- RIGHT SIDE - LOGIN CARD -->
        <div class="login-card">
          <h2 class="login-title">Welcome Back</h2>
          <p class="login-subtitle">Sign in to continue to SWAPPR</p>

          <div id="loginError" class="error-msg"></div>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <input
              type="text"
              id="loginUsername"
              placeholder="Username"
              class="input-field"
              autocomplete="username"
              required
            />
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              class="input-field"
              autocomplete="current-password"
              required
            />
            <button type="submit" class="btn-login" id="loginBtn">
              Log In
            </button>
          </form>

          <div class="divider">
            <span>or</span>
          </div>

          <button onclick="openRegisterModal()" class="btn-register">
            Create New Account
          </button>
        </div>
      </div>
    </div>

    <!-- REGISTRATION MODAL -->
    <div
      id="registerModal"
      class="modal-overlay"
      onclick="closeModalOnOutsideClick(event)"
    >
      <div class="modal-content">
        <div class="modal-header">
          <button class="modal-close" onclick="closeRegisterModal()">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
          <h2 class="modal-title">Create Account</h2>
          <p class="modal-subtitle">Join SWAPPR and start collaborating</p>
        </div>
        <div class="modal-body">
          <div id="registerError" class="error-msg"></div>
          <div id="registerSuccess" class="success-msg"></div>

          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
              <input
                type="text"
                id="regName"
                placeholder="Full name"
                class="input-field"
                autocomplete="name"
                required
              />
              <input
                type="text"
                id="regStudentId"
                placeholder="Student ID"
                class="input-field"
                autocomplete="off"
                required
              />
            </div>
            <input
              type="text"
              id="regCourse"
              placeholder="Course"
              class="input-field"
              style="margin-bottom: 12px"
              autocomplete="off"
              required
            />
            <input
              type="text"
              id="regUsername"
              placeholder="Username"
              class="input-field"
              style="margin-bottom: 12px"
              autocomplete="username"
              required
            />
            <input
              type="password"
              id="regPassword"
              placeholder="New password (min. 4 characters)"
              class="input-field"
              autocomplete="new-password"
              required
              minlength="4"
            />
            <button type="submit" class="btn-signup" id="registerBtn">
              Sign Up
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      // Check if already logged in
      if (sessionStorage.getItem("currentUser")) {
        window.location.href = "index.html";
      }

      // Modal functions
      function openRegisterModal() {
        const modal = document.getElementById("registerModal");
        modal.classList.add("active");
        document.getElementById("registerError").style.display = "none";
        document.getElementById("registerSuccess").style.display = "none";
        // Clear form
        document.getElementById("registerForm").reset();

        // Reinitialize icons after modal opens
        setTimeout(() => lucide.createIcons(), 50);
      }

      function closeRegisterModal() {
        document.getElementById("registerModal").classList.remove("active");
      }

      function closeModalOnOutsideClick(event) {
        if (event.target.id === "registerModal") {
          closeRegisterModal();
        }
      }

      // Escape key to close modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeRegisterModal();
        }
      });

      // Login handler
      async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const errorEl = document.getElementById("loginError");
        const loginBtn = document.getElementById("loginBtn");

        errorEl.style.display = "none";

        if (!username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }

        // Disable button during request
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (data.success && data.user && data.user.username) {
            sessionStorage.setItem("currentUser", JSON.stringify(data.user));
            window.location.href = "index.html";
          } else {
            errorEl.textContent =
              data.message || "Invalid username or password.";
            errorEl.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.textContent = "Log In";
          }
        } catch (err) {
          console.error("Login error:", err);
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
          loginBtn.disabled = false;
          loginBtn.textContent = "Log In";
        }
      }

      // Register handler
      async function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById("regName").value.trim();
        const studentId = document.getElementById("regStudentId").value.trim();
        const course = document.getElementById("regCourse").value.trim();
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const errorEl = document.getElementById("registerError");
        const successEl = document.getElementById("registerSuccess");
        const registerBtn = document.getElementById("registerBtn");

        errorEl.style.display = "none";
        successEl.style.display = "none";

        if (!name || !studentId || !course || !username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }

        if (!/^[0-9]+$/.test(studentId)) {
          errorEl.textContent = "Student ID must contain numbers only.";
          errorEl.style.display = "block";
          return;
        }

        if (password.length < 4) {
          errorEl.textContent = "Password must be at least 4 characters.";
          errorEl.style.display = "block";
          return;
        }

        // Disable button during request
        registerBtn.disabled = true;
        registerBtn.textContent = "Creating account...";

        try {
          const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              course,
              username,
              password,
              yearLevel: studentId || "",
            }),
          });
          const data = await res.json();

          if (data.success) {
            // Clear form
            document.getElementById("registerForm").reset();

            if (data.user && data.user.username) {
              sessionStorage.setItem("currentUser", JSON.stringify(data.user));
              successEl.textContent = "Registration successful! Redirecting...";
              successEl.style.display = "block";
              setTimeout(() => {
                window.location.href = "index.html";
              }, 1000);
            } else {
              successEl.textContent =
                "Registration successful! You can now log in.";
              successEl.style.display = "block";
              setTimeout(() => {
                closeRegisterModal();
              }, 2000);
            }
          } else {
            errorEl.textContent =
              data.message ||
              "Registration failed. Username may already exist.";
            errorEl.style.display = "block";
            registerBtn.disabled = false;
            registerBtn.textContent = "Sign Up";
          }
        } catch (err) {
          console.error("Registration error:", err);
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
          registerBtn.disabled = false;
          registerBtn.textContent = "Sign Up";
        }
      }
    </script>
  </body>
</html>

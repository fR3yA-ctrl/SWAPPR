<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWAPPR — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link

      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login_styles.css" />

  <body>
    <!-- Background particles -->
    <div
      class="bg-particle"
      style="
        width: 300px;
        height: 300px;
        top: 10%;
        left: 5%;
        animation-delay: 0s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 200px;
        height: 200px;
        top: 60%;
        left: 10%;
        animation-delay: 5s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 250px;
        height: 250px;
        top: 30%;
        right: 10%;
        animation-delay: 3s;
      "
    ></div>
    <div
      class="bg-particle"
      style="
        width: 180px;
        height: 180px;
        bottom: 20%;
        right: 15%;
        animation-delay: 7s;
      "
    ></div>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <div class="content-wrapper">
        <!-- LEFT SIDE - BRANDING -->
        <div class="branding">
          <div class="logo-section">
            <img
              src="Images/swappr_logo_updated.jpg"
              alt="SWAPPR Logo"
              class="logo-img"
              onerror="this.style.display = 'none'"
            />
            <h1 class="brand-name">SWAPPR</h1>
          </div>

          <p class="tagline">
            Connect with students, trade notes, and achieve academic success
            together.
          </p>

          <div class="features">
            <div class="feature-item">
              <i data-lucide="book-open" class="feature-icon"></i>
              <span>Exchange study materials instantly</span>
            </div>
            <div class="feature-item">
              <i data-lucide="handshake" class="feature-icon"></i>
              <span>Find your perfect study partner</span>
            </div>
            <div class="feature-item">
              <i data-lucide="target" class="feature-icon"></i>
              <span>Improve grades through collaboration</span>
            </div>
          </div>
        </div>

        <!-- RIGHT SIDE - LOGIN CARD -->
        <div class="login-card">
          <h2 class="login-title">Welcome Back</h2>
          <p class="login-subtitle">Sign in to continue to SWAPPR</p>

          <div id="loginError" class="error-msg"></div>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <input
              type="text"
              id="loginUsername"
              placeholder="Username"
              class="input-field"
              autocomplete="username"
              required
            />
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              class="input-field"
              autocomplete="current-password"
              required
            />
            <button type="submit" class="btn-login" id="loginBtn">
              Log In
            </button>
          </form>

          <div class="divider">
            <span>or</span>
          </div>

          <button onclick="openRegisterModal()" class="btn-register">
            Create New Account
          </button>
        </div>
      </div>
    </div>

    <!-- REGISTRATION MODAL -->

      id="registerModal"
      class="modal-overlay"
      onclick="closeModalOnOutsideClick(event)"
    >
      <div class="modal-content">
        <div class="modal-header">
          <button class="modal-close" onclick="closeRegisterModal()">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
          <h2 class="modal-title">Create Account</h2>
          <p class="modal-subtitle">Join SWAPPR and start collaborating</p>
        </div>
        <div class="modal-body">
          <div id="registerError" class="error-msg"></div>
          <div id="registerSuccess" class="success-msg"></div>

          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
              <input

                id="regName"
                placeholder="Full name"
                class="input-field"
                autocomplete="name"
                required
              />
              <input

                id="regStudentId"
                placeholder="Student ID"
                class="input-field"
                autocomplete="off"
                required

            </div>
            <div class="custom-select-wrapper" style="position: relative; width: 100%; margin-bottom: 1rem;">
              <select id="regCourse" class="input-field" style="display: none;" required>
                <option value="">Select your course</option>
                <optgroup label="School of Architecture, Fine Arts, and Design">
                  <option value="Bachelor of Science in Architecture">
                    Bachelor of Science in Architecture

                  <option value="Bachelor of Landscape Architecture">

                  </option>
                  <option value="Bachelor of Science in Interior Design">

                  <option value="Bachelor of Arts in Anthropology">
                    Bachelor of Arts in Anthropology

                  </option>
                  <option value="Bachelor of Science in Marine Biology">
                    Bachelor of Science in Marine Biology
                  </option>
                  <option value="Bachelor of Science in Chemistry">
                    Bachelor of Science in Chemistry
                  </option>
                  <option value="Bachelor of Arts in English Language Studies">
                    Bachelor of Arts in English Language Studies
                  </option>
                  <option value="Bachelor of Arts in Literary and Cultural Studies with Creative Writing">
                    Bachelor of Arts in Literary and Cultural Studies with Creative Writing
                  </option>
                  <option value="Bachelor of Arts in Communication major in Media">
                    Bachelor of Arts in Communication major in Media
                  </option>
                  <option value="Bachelor of Science in Computer Science">
                    Bachelor of Science in Computer Science
                  </option>
                  <option value="Bachelor of Science in Information Systems">
                    Bachelor of Science in Information Systems
                  </option>
                  <option value="Bachelor of Science in Information Technology">
                    Bachelor of Science in Information Technology
                  </option>
                  <option value="Bachelor of Science in Data Science">
                    Bachelor of Science in Data Science
                  </option>
                  <option value="Bachelor of Philosophy">Bachelor of Philosophy</option>
                  <option value="Bachelor of Science in Applied Physics">
                    Bachelor of Science in Applied Physics
                  </option>
                  <option value="Bachelor of Science in Psychology">
                    Bachelor of Science in Psychology
                  </option>
                </optgroup>
                <optgroup label="School of Business and Economics">
                  <option value="Bachelor of Science in Business Administration major in Financial Management">

                  </option>
                  <option value="Bachelor of Science in Business Administration major in Human Resource Management">
                    Bachelor of Science in Business Administration major in Human Resource Management
                  </option>
                  <option value="Bachelor of Science in Business Administration major in Marketing Management">
                    Bachelor of Science in Business Administration major in Marketing Management
                  </option>
                  <option value="Bachelor of Science in Business Administration major in Operations Management">

                  </option>
                  <option value="Bachelor of Science in Management Accounting">

                  </option>
                  <option value="Bachelor of Science in Internal Auditing">

                  </option>
                  <option value="Bachelor of Science in Entrepreneurship">
                    Bachelor of Science in Entrepreneurship
                  </option>
                  <option value="Bachelor of Science in Economics">

                  </option>
                  <option value="Bachelor of Science in Hospitality Management">

                  <option value="Bachelor of Science in Tourism Management">
                    Bachelor of Science in Tourism Management

                    Bachelor of Science in Chemical Engineering
                  </option>

                    Bachelor of Science in Civil Engineering
                  </option>
                  <option value="Bachelor of Science in Computer Engineering">
                    Bachelor of Science in Computer Engineering
                  </option>
                  <option value="Bachelor of Science in Electrical Engineering">
                    Bachelor of Science in Electrical Engineering
                  </option>
                  <option value="Bachelor of Science in Electronics Engineering">
                    Bachelor of Science in Electronics Engineering
                  </option>
                  <option value="Bachelor of Science in Industrial Engineering">
                    Bachelor of Science in Industrial Engineering
                  </option>
                  <option value="Bachelor of Science in Mechanical Engineering">
                    Bachelor of Science in Mechanical Engineering
                  </option>
                </optgroup>
                <optgroup label="School of Health Care Professions">
                  <option value="Bachelor of Science in Nursing">
                    Bachelor of Science in Nursing
                  </option>
                  <option value="Bachelor of Science in Nutrition and Dietetics">
                    Bachelor of Science in Nutrition and Dietetics
                  </option>
                  <option value="Bachelor of Science in Pharmacy">
                    Bachelor of Science in Pharmacy
                  </option>
                </optgroup>
                <optgroup label="School of Law and Governance">
                  <option value="Bachelor of Arts in Political Science major in International Relations and Foreign Service">
                    Bachelor of Arts in Political Science major in International Relations and Foreign Service
                  </option>
                  <option value="Bachelor of Arts in Political Science major in Law and Policy Studies">
                    Bachelor of Arts in Political Science major in Law and Policy Studies
                  </option>
                </optgroup>
              </select>
              <button
                type="button"
                id="regCourseButton"
                class="input-field custom-select-button"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                <span class="custom-select-label">Select your school</span>
                <span class="custom-select-icon">▾</span>
              </button>
              <div id="regCourseList" class="custom-select-list hidden" role="listbox" tabindex="0"></div>
            </div>
            <input
              type="text"
              id="regUsername"
              placeholder="Username"
              class="input-field"
              style="margin-bottom: 12px"
              autocomplete="username"
              required
            />
            <input
              type="password"
              id="regPassword"
              placeholder="New password (min. 4 characters)"
              class="input-field"
              autocomplete="new-password"
              required
              minlength="4"
            />
            <button type="submit" class="btn-signup" id="registerBtn">
              Sign Up
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      // Check if already logged in
      if (sessionStorage.getItem("currentUser")) {
        window.location.href = "index.html";
      }

      // Custom dropdown for regCourse with click-open typing support
      (function () {
        const courseSelect = document.getElementById("regCourse");
        const courseButton = document.getElementById("regCourseButton");
        const courseList = document.getElementById("regCourseList");
        if (!courseSelect || !courseButton || !courseList) return;

        const topLevelOptions = Array.from(courseSelect.children)
          .filter((child) => child.tagName.toLowerCase() === "option")
          .filter((opt) => opt.value)
          .map((opt) => ({
            value: opt.value,
            label: opt.textContent.trim(),
            normalized: opt.textContent.trim().toLowerCase(),
          }));

        const groups = Array.from(courseSelect.querySelectorAll("optgroup")).map(
          (group) => ({
            label: group.label,
            options: Array.from(group.querySelectorAll("option"))
              .filter((opt) => opt.value)
              .map((opt) => ({
                value: opt.value,
                label: opt.textContent.trim(),
                normalized: opt.textContent.trim().toLowerCase(),
              })),
          })
        );

        const options = [...topLevelOptions, ...groups.flatMap((group) => group.options)];

        let isOpen = false;
        let highlightedIndex = -1;
        let typeBuffer = "";
        let bufferTimer = null;
        const MIN_TYPE_MATCH_LENGTH = 3;

        const clearTypeBuffer = () => {
          typeBuffer = "";
          if (bufferTimer) {
            clearTimeout(bufferTimer);
            bufferTimer = null;
          }
        };

        const scheduleTypeBufferClear = () => {
          if (bufferTimer) {
            clearTimeout(bufferTimer);
          }
          bufferTimer = setTimeout(clearTypeBuffer, 1000);
        };

        const updateButtonLabel = () => {
          const selected = options.find((opt) => opt.value === courseSelect.value);
          const labelText = selected ? selected.label : "Select your school";
          const textSpan = courseButton.querySelector(".custom-select-label");
          if (textSpan) {
            textSpan.textContent = labelText;
          } else {
            courseButton.textContent = labelText;
          }
        };

        const highlightOption = (index, scrollIntoView = false) => {
          const items = Array.from(courseList.querySelectorAll(".custom-select-option"));
          if (!items.length) return;

          if (index < 0) index = 0;
          if (index >= items.length) index = items.length - 1;

          highlightedIndex = index;
          items.forEach((item, idx) => {
            const isActive = idx === highlightedIndex;
            item.classList.toggle("highlighted", isActive);
            item.setAttribute("aria-selected", isActive ? "true" : "false");
            if (isActive && scrollIntoView) {
              const itemRect = item.getBoundingClientRect();
              const listRect = courseList.getBoundingClientRect();
              if (itemRect.top < listRect.top || itemRect.bottom > listRect.bottom) {
                item.scrollIntoView({ block: "nearest" });
              }
            }
          });
        };

        const openList = () => {
          if (isOpen) return;
          isOpen = true;
          courseList.classList.remove("hidden");
          courseButton.setAttribute("aria-expanded", "true");
          courseButton.classList.add("open");
          const selectedIndex = options.findIndex((opt) => opt.value === courseSelect.value);
          highlightOption(selectedIndex >= 0 ? selectedIndex : 0);
          courseList.focus();
        };

        const closeList = () => {
          if (!isOpen) return;
          isOpen = false;
          courseList.classList.add("hidden");
          courseButton.setAttribute("aria-expanded", "false");
          courseButton.classList.remove("open");
          clearTypeBuffer();
        };

        const setSelected = (value) => {
          courseSelect.value = value;
          updateButtonLabel();
        };

        const findMatch = (query) => {
          const normalized = query.trim().toLowerCase();
          if (!normalized) return null;

          const terms = normalized.split(/\s+/).filter(Boolean);
          const candidates = options
            .map((opt) => {
              const normalizedLabel = opt.normalized;
              const words = normalizedLabel.split(/\s+/);
              const startsWith = normalizedLabel.startsWith(normalized);
              const wordStartIndex = words.findIndex((word) => word.startsWith(normalized));
              const containsAll = terms.every((term) => normalizedLabel.includes(term));

              let score = 0;
              if (startsWith) {
                score = 200000 - normalizedLabel.length;
              } else if (wordStartIndex >= 0) {
                score = 100000 - wordStartIndex * 10 - words[wordStartIndex].length;
              } else if (terms.length >= 3 && containsAll) {
                score = 50000 - normalizedLabel.length;
              }

              return { opt, score, wordStartIndex };
            })
            .filter((item) => item.score > 0);

          if (!candidates.length) return null;
          candidates.sort((a, b) => b.score - a.score);
          return candidates[0].opt;
        };

        const handleType = (key) => {
          typeBuffer += key.toLowerCase();
          scheduleTypeBufferClear();
          if (typeBuffer.length < MIN_TYPE_MATCH_LENGTH) {
            return;
          }
          const match = findMatch(typeBuffer);
          if (match) {
            const matchIndex = options.findIndex((opt) => opt.value === match.value);
            highlightOption(matchIndex, true);
          }
        };

        const handleKeyDown = (event) => {
          if (event.ctrlKey || event.metaKey || event.altKey) return;

          if (event.key === "Escape") {
            event.preventDefault();
            closeList();
            courseButton.focus();
            return;
          }

          if (event.key === "ArrowDown") {
            event.preventDefault();
            if (!isOpen) {
              openList();
              return;
            }
            highlightOption(highlightedIndex + 1, true);
            return;
          }

          if (event.key === "ArrowUp") {
            event.preventDefault();
            if (!isOpen) {
              openList();
              return;
            }
            highlightOption(highlightedIndex - 1, true);
            return;
          }

          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            if (!isOpen) {
              openList();
              return;
            }
            if (highlightedIndex >= 0) {
              setSelected(options[highlightedIndex].value);
            }
            closeList();
            courseButton.focus();
            return;
          }

          if (event.key === "Backspace") {
            event.preventDefault();
            if (typeBuffer.length > 0) {
              typeBuffer = typeBuffer.slice(0, -1);
              scheduleTypeBufferClear();
              if (typeBuffer.length >= MIN_TYPE_MATCH_LENGTH) {
                const match = findMatch(typeBuffer);
                if (match) {
                  const matchIndex = options.findIndex((opt) => opt.value === match.value);
                  highlightOption(matchIndex, true);
                }
              }
            }
            return;
          }

          if (event.key.length === 1) {
            event.preventDefault();
            if (!isOpen) {
              openList();
            }
            handleType(event.key);
          }
        };

        const renderOptions = () => {
          courseList.innerHTML = "";
          let optionIndex = 0;

          if (topLevelOptions.length) {
            topLevelOptions.forEach((option) => {
              const currentIndex = optionIndex;
              const optionEl = document.createElement("div");
              optionEl.id = `regCourseOption${currentIndex}`;
              optionEl.className = "custom-select-option";
              optionEl.setAttribute("role", "option");
              optionEl.setAttribute("aria-selected", "false");
              optionEl.dataset.value = option.value;
              optionEl.textContent = option.label;

              optionEl.addEventListener("click", () => {
                setSelected(option.value);
                closeList();
                courseButton.focus();
              });

              optionEl.addEventListener("mousemove", () => {
                highlightOption(currentIndex);
              });

              courseList.appendChild(optionEl);
              optionIndex += 1;
            });
          }

          groups.forEach((group) => {
            if (group.label) {
              const header = document.createElement("div");
              header.className = "custom-select-group";
              header.textContent = group.label;
              header.setAttribute("role", "presentation");
              courseList.appendChild(header);
            }

            group.options.forEach((option) => {
              const currentIndex = optionIndex;
              const optionEl = document.createElement("div");
              optionEl.id = `regCourseOption${currentIndex}`;
              optionEl.className = "custom-select-option";
              optionEl.setAttribute("role", "option");
              optionEl.setAttribute("aria-selected", "false");
              optionEl.dataset.value = option.value;
              optionEl.textContent = option.label;

              optionEl.addEventListener("click", () => {
                setSelected(option.value);
                closeList();
                courseButton.focus();
              });

              optionEl.addEventListener("mousemove", () => {
                highlightOption(currentIndex);
              });

              courseList.appendChild(optionEl);
              optionIndex += 1;
            });
          });
        };

        renderOptions();
        updateButtonLabel();

        courseButton.addEventListener("click", () => {
          toggleList();
        });

        document.addEventListener(
          "keydown",
          (event) => {
            if (!isOpen) return;
            if (event.ctrlKey || event.metaKey || event.altKey) return;
            const ignoredTags = ["INPUT", "TEXTAREA", "SELECT"];
            if (ignoredTags.includes(event.target.tagName)) return;
            handleKeyDown(event);
          },
          true
        );

        courseList.addEventListener("click", (event) => {
          const clicked = event.target.closest(".custom-select-option");
          if (!clicked) return;
          const value = clicked.dataset.value;
          if (value) {
            setSelected(value);
          }
          closeList();
          courseButton.focus();
        });

        document.addEventListener("click", (event) => {
          if (
            !courseList.contains(event.target) &&
            !courseButton.contains(event.target)
          ) {
            closeList();
          }
        });

        function toggleList() {
          if (isOpen) {
            closeList();
          } else {
            openList();
          }
        }
      })();

      // Modal functions
      function openRegisterModal() {
        const modal = document.getElementById("registerModal");
        modal.classList.add("active");
        document.getElementById("registerError").style.display = "none";
        document.getElementById("registerSuccess").style.display = "none";
        // Clear form
        document.getElementById("registerForm").reset();

        // Focus the course button so custom type-to-select works immediately.
        requestAnimationFrame(() => {
          const courseButton = document.getElementById("regCourseButton");
          if (courseButton) courseButton.focus();
        });

        // Reinitialize icons after modal opens
        setTimeout(() => lucide.createIcons(), 50);
      }

      function closeRegisterModal() {
        document.getElementById("registerModal").classList.remove("active");
      }

      function closeModalOnOutsideClick(event) {
        if (event.target.id === "registerModal") {
          closeRegisterModal();
        }
      }

      // Escape key to close modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeRegisterModal();
        }
      });

      // Login handler
      async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const errorEl = document.getElementById("loginError");
        const loginBtn = document.getElementById("loginBtn");

        errorEl.style.display = "none";

        if (!username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }

        // Disable button during request
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (data.success && data.user && data.user.username) {
            sessionStorage.setItem("currentUser", JSON.stringify(data.user));
            window.location.href = "index.html";
          } else {
            errorEl.textContent =
              data.message || "Invalid username or password.";
            errorEl.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.textContent = "Log In";
          }
        } catch (err) {
          console.error("Login error:", err);
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
          loginBtn.disabled = false;
          loginBtn.textContent = "Log In";
        }
      }

      // Register handler
      async function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById("regName").value.trim();
        const studentId = document.getElementById("regStudentId").value.trim();
        const course = document.getElementById("regCourse").value.trim();
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const errorEl = document.getElementById("registerError");
        const successEl = document.getElementById("registerSuccess");
        const registerBtn = document.getElementById("registerBtn");

        errorEl.style.display = "none";
        successEl.style.display = "none";

        if (!name || !studentId || !course || !username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }

        if (!/^[0-9]+$/.test(studentId)) {
          errorEl.textContent = "Student ID must contain numbers only.";
          errorEl.style.display = "block";
          return;
        }

        if (password.length < 4) {
          errorEl.textContent = "Password must be at least 4 characters.";
          errorEl.style.display = "block";
          return;
        }

        // Disable button during request
        registerBtn.disabled = true;
        registerBtn.textContent = "Creating account...";

        try {
          const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              course,
              username,
              password,
              yearLevel: studentId || "",
            }),
          });
          const data = await res.json();

          if (data.success) {
            // Clear form
            document.getElementById("registerForm").reset();

            if (data.user && data.user.username) {
              sessionStorage.setItem("currentUser", JSON.stringify(data.user));
              successEl.textContent = "Registration successful! Redirecting...";
              successEl.style.display = "block";
              setTimeout(() => {
                window.location.href = "index.html";
              }, 1000);
            } else {
              successEl.textContent =
                "Registration successful! You can now log in.";
              successEl.style.display = "block";
              setTimeout(() => {
                closeRegisterModal();
              }, 2000);
            }
          } else {
            errorEl.textContent =
              data.message ||
              "Registration failed. Username may already exist.";
            errorEl.style.display = "block";
            registerBtn.disabled = false;
            registerBtn.textContent = "Sign Up";
          }
        } catch (err) {
          console.error("Registration error:", err);
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
          registerBtn.disabled = false;
          registerBtn.textContent = "Sign Up";
        }
      }
    </script>
  </body>
</html>

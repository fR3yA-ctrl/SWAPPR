<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWAPPR — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
      }

      .bg-pattern {
        background-color: #f5f3ff;
        background-image:
          radial-gradient(
            circle at 15% 25%,
            rgba(74, 0, 128, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(91, 91, 214, 0.08) 0%,
            transparent 50%
          );
      }
      .dark .bg-pattern {
        background-color: #180f2e;
        background-image:
          radial-gradient(
            circle at 15% 25%,
            rgba(139, 92, 246, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(74, 0, 128, 0.1) 0%,
            transparent 50%
          );
      }

      .card-shadow {
        box-shadow:
          0 0 0 1px #ede9fe,
          0 20px 60px rgba(74, 0, 128, 0.1);
      }
      .dark .card-shadow {
        box-shadow:
          0 0 0 1px #3a2565,
          0 20px 60px rgba(13, 2, 33, 0.6);
      }

      .input-field {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1.5px solid #ddd6fe;
        background: #faf5ff;
        color: #1e1033;
        font-family: "Montserrat", sans-serif;
        font-size: 0.875rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input-field:focus {
        border-color: #7b2fbe;
        box-shadow: 0 0 0 3px rgba(123, 47, 190, 0.12);
      }
      .dark .input-field {
        background: #2a1d48;
        border-color: #3a2565;
        color: #f0eaff;
      }
      .dark .input-field:focus {
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
      }
      .dark .input-field::placeholder {
        color: #5a4878;
      }

      .btn-primary {
        width: 100%;
        padding: 0.8rem;
        border-radius: 0.75rem;
        background: linear-gradient(135deg, #4a0080, #7b2fbe);
        color: white;
        font-weight: 700;
        font-family: "Montserrat", sans-serif;
        font-size: 0.875rem;
        letter-spacing: 0.03em;
        border: none;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
        box-shadow: 0 4px 14px rgba(74, 0, 128, 0.3);
      }
      .btn-primary:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }

      .tab-btn {
        flex: 1;
        padding: 0.55rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: transparent;
        color: #9b8ec4;
        font-family: "Montserrat", sans-serif;
      }
      .tab-btn.active {
        background: white;
        color: #4a0080;
        box-shadow: 0 1px 6px rgba(74, 0, 128, 0.12);
      }
      .dark .tab-btn {
        color: #6040a0;
      }
      .dark .tab-btn.active {
        background: #2a1d48;
        color: #d0c0f8;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
      }

      .tab-bar {
        background: #f5f3ff;
        border-radius: 0.75rem;
      }
      .dark .tab-bar {
        background: #180f2e;
        border: 1px solid #3a2565;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.45s ease forwards;
      }

      .error-msg {
        color: #ef4444;
        font-size: 0.78rem;
        margin-top: 0.4rem;
        display: none;
      }
      .success-msg {
        color: #7b2fbe;
        font-size: 0.78rem;
        margin-top: 0.4rem;
        display: none;
      }
      .dark .success-msg {
        color: #c4b5fd;
      }
    </style>
  </head>

  <body
    class="bg-pattern dark:bg-pattern min-h-screen transition-colors duration-300"
  >
    <!-- THEME BUTTON -->
    <button
      id="themeToggle"
      class="fixed top-4 right-4 w-9 h-9 rounded-full shadow-sm flex items-center justify-center text-base transition hover:scale-110 border bg-white dark:bg-[#110e20] border-[#ddd6fe] dark:border-white/[0.06]"
    >
      🌙
    </button>

    <!-- LOGO TOP LEFT -->
    <div class="absolute top-6 left-8 flex items-center gap-2">
      <img src="Images/swappr_logo.jpg" class="w-8 h-8 object-contain" />
      <span class="text-lg font-bold text-purple-800 dark:text-purple-300">
        SWAPPR
      </span>
    </div>

    <!-- MAIN CONTAINER -->
    <div
      class="min-h-screen flex flex-col md:flex-row items-center justify-center px-6"
    >
      <!-- LEFT SIDE -->
      <div
        class="w-full md:w-1/2 flex flex-col justify-center md:pl-20 mb-10 md:mb-0"
      >
        <div class="flex items-center gap-3 mb-4">
          <img
            src="Images/swappr_logo.jpg"
            class="w-12 h-12 object-contain drop-shadow-lg"
          />
          <h1
            class="text-4xl font-extrabold text-purple-800 dark:text-purple-300"
          >
            SWAPPR
          </h1>
        </div>

        <p
          class="text-xl text-gray-700 dark:text-gray-300 max-w-md leading-relaxed"
        >
          Get the notes you need by sharing what you know. Connect with students
          who complement your strengths.
        </p>

        <div
          class="mt-8 space-y-2 text-sm text-purple-700 dark:text-purple-300"
        >
          <p>📘 Trade notes instantly</p>
          <p>🤝 Find your academic match</p>
          <p>🚀 Boost your grades together</p>
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="w-full md:w-1/2 flex justify-center">
        <div
          class="fade-up bg-white dark:bg-[#110e20] rounded-2xl p-8 w-full max-w-sm card-shadow transition-colors duration-300"
        >
          <div class="tab-bar flex p-1 mb-6">
            <button
              id="loginTab"
              class="tab-btn active"
              onclick="switchTab('login')"
            >
              Login
            </button>
            <button
              id="registerTab"
              class="tab-btn"
              onclick="switchTab('register')"
            >
              Register
            </button>
          </div>

          <div id="loginForm">
            <input
              type="text"
              id="loginUsername"
              placeholder="Username"
              class="input-field mb-4"
            />
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              class="input-field mb-4"
            />
            <button class="btn-primary" onclick="handleLogin()">Login</button>
            <div id="loginError" class="error-msg text-center"></div>
          </div>

          <div id="registerForm" class="hidden">
            <input
              type="text"
              id="regName"
              placeholder="Full Name"
              class="input-field mb-3"
            />
            <input
              type="text"
              id="regStudentId"
              placeholder="Student ID"
              class="input-field mb-3"
            />
            <input
              type="text"
              id="regCourse"
              placeholder="Course"
              class="input-field mb-3"
            />
            <input
              type="text"
              id="regUsername"
              placeholder="Username"
              class="input-field mb-3"
            />
            <input
              type="password"
              id="regPassword"
              placeholder="Password"
              class="input-field mb-4"
            />
            <button class="btn-primary" onclick="handleRegister()">
              Register
            </button>
            <div id="registerError" class="error-msg text-center"></div>
            <div id="registerSuccess" class="success-msg text-center">
              Registration successful!
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") document.documentElement.classList.add("dark");
      const toggle = document.getElementById("themeToggle");
      toggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";
      toggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
        const isDark = document.documentElement.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        toggle.textContent = isDark ? "☀️" : "🌙";
      });

      if (sessionStorage.getItem("currentUser"))
        window.location.href = "index.html";

      function switchTab(tab) {
        const isLogin = tab === "login";
        document
          .getElementById("loginForm")
          .classList.toggle("hidden", !isLogin);
        document
          .getElementById("registerForm")
          .classList.toggle("hidden", isLogin);
        document.getElementById("loginTab").classList.toggle("active", isLogin);
        document
          .getElementById("registerTab")
          .classList.toggle("active", !isLogin);
      }

      async function handleLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const errorEl = document.getElementById("loginError");
        errorEl.style.display = "none";
        if (!username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (data.success && data.user && data.user.username) {
            sessionStorage.setItem("currentUser", JSON.stringify(data.user));
            window.location.href = "index.html";
          } else if (data.success) {
            errorEl.textContent = "Login error. Please try again.";
            errorEl.style.display = "block";
          } else {
            errorEl.textContent =
              data.message || "Invalid username or password.";
            errorEl.style.display = "block";
          }
        } catch {
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
        }
      }

      async function handleRegister() {
        const name = document.getElementById("regName").value.trim();
        const studentId = document.getElementById("regStudentId").value.trim();
        const course = document.getElementById("regCourse").value;
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const errorEl = document.getElementById("registerError");
        const successEl = document.getElementById("registerSuccess");
        errorEl.style.display = successEl.style.display = "none";

        if (!name || !studentId || !course || !username || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.style.display = "block";
          return;
        }
        if (!/^[0-9]+$/.test(studentId)) {
          errorEl.textContent = "Student ID must contain numbers only.";
          errorEl.style.display = "block";
          return;
        }
        if (password.length < 4) {
          errorEl.textContent = "Password must be at least 4 characters.";
          errorEl.style.display = "block";
          return;
        }
        try {
          const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              course,
              username,
              password,
              yearLevel: studentId || "",
            }),
          });
          const data = await res.json();
          if (data.success) {
            // Reset form fields
            document.getElementById("regName").value = "";
            document.getElementById("regStudentId").value = "";
            document.getElementById("regCourse").value = "";
            document.getElementById("regUsername").value = "";
            document.getElementById("regPassword").value = "";
            // Only auto-login if server returned a valid user object
            if (data.user && data.user.username) {
              sessionStorage.setItem("currentUser", JSON.stringify(data.user));
              window.location.href = "index.html";
            } else {
              // Fallback: show success and redirect to login tab
              successEl.style.display = "block";
              setTimeout(() => {
                successEl.style.display = "none";
                switchTab("login");
              }, 1800);
            }
          } else {
            errorEl.textContent = data.message || "Registration failed.";
            errorEl.style.display = "block";
          }
        } catch {
          errorEl.textContent = "Server error. Please try again.";
          errorEl.style.display = "block";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          !document.getElementById("loginForm").classList.contains("hidden")
            ? handleLogin()
            : handleRegister();
        }
      });
    </script>
  </body>
</html>
